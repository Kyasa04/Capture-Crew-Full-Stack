<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects | Capture Crew</title>
  <link rel="stylesheet" href="crew.css" />
</head>
<body>
  <div class="bg-overlay"></div>

  <header>
    <h2>📸 Your Projects</h2>
    <div class="profile-menu">
      <a href="crew.html">Dashboard</a>
      <a href="crewprofile.html">Profile</a>
    </div>
  </header>

  <section class="content-box">
    <h3>Assigned & Completed Projects</h3>

    <div id="projectsContainer">
      <!-- Projects will render here -->
    </div>

    <div style="margin-top:18px;">
      <button class="btn" onclick="window.location.href='crew.html'">Back to Dashboard</button>
    </div>
  </section>

<script>
const PROJECTS_KEY = 'crewProjects';
const MESSAGES_KEY = 'crewMessages';

function renderProjects(){
  const container = document.getElementById('projectsContainer');
  container.innerHTML = '';
  const projects = JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]');
  if(projects.length === 0){
    container.innerHTML = '<p>No projects yet. Accept a service or create a booking.</p>';
    return;
  }

  projects.forEach(p => {
    const div = document.createElement('div');
    div.className = 'project-card';
    div.innerHTML = `
      <h4>${escapeHtml(p.title)}</h4>
      <p><strong>Date:</strong> ${escapeHtml(p.date || '—')}</p>
      <p><strong>Location:</strong> ${escapeHtml(p.location || '—')}</p>
      <p>${escapeHtml(p.details || '')}</p>
      <p><strong>Status:</strong> ${escapeHtml(p.status || '—')}</p>
      <div style="display:flex; gap:10px; margin-top:10px;">
        ${p.status !== 'Completed' ? `<button class="btn complete-btn" data-id="${p.id}">Mark Completed</button>` : ''}
        <button class="btn delete-btn" data-id="${p.id}">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });

  // listeners
  container.querySelectorAll('.complete-btn').forEach(b=>{
    b.addEventListener('click', ()=> markCompleted(b.getAttribute('data-id')));
  });
  container.querySelectorAll('.delete-btn').forEach(b=>{
    b.addEventListener('click', ()=> deleteProject(b.getAttribute('data-id')));
  });
}

function markCompleted(id){
  const projects = JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]');
  const idx = projects.findIndex(p=>p.id===id);
  if(idx === -1) return;
  projects[idx].status = 'Completed';
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));

  // push a message
  const messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
  messages.unshift({
    id: 'm' + Date.now(),
    from: 'System',
    text: `Project completed: ${projects[idx].title}`,
    createdAt: new Date().toISOString(),
    read: false
  });
  localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
  renderProjects();
}

function deleteProject(id){
  let projects = JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]');
  projects = projects.filter(p => p.id !== id);
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
  renderProjects();
}

function escapeHtml(s){ if(!s) return ''; return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

renderProjects();
</script>
</body>
</html>
