<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Booking | Capture Crew</title>
  <link rel="stylesheet" href="crew.css" />
</head>
<body>
  <div class="bg-overlay"></div>

  <header>
    <h2>📅 Create Booking</h2>
    <div class="profile-menu">
      <a href="crew.html">Dashboard</a>
      <a href="crewprofile.html">Profile</a>
    </div>
  </header>

  <section class="content-box">
    <h3>Schedule a New Event</h3>

    <form id="bookingForm" class="booking-form">
      <label>Event / Service</label>
      <select id="serviceType" required>
        <option value="">Select a service</option>
        <option>Wedding Shoot</option>
        <option>Fitness Shoot</option>
        <option>Office Events</option>
        <option>Fashion Portfolio</option>
        <option>Special Events</option>
        <option>Birthday / Reels</option>
      </select>

      <label>Date</label>
      <input id="eventDate" type="date" required>

      <label>Location</label>
      <input id="eventLocation" type="text" placeholder="City or address" required>

      <label>Details</label>
      <textarea id="eventDetails" rows="4" placeholder="Add notes or requirements" required></textarea>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button class="btn" type="submit">Submit Booking</button>
        <button class="btn" type="button" onclick="window.location.href='crew.html'">Cancel</button>
      </div>

      <div id="bookMsg" style="margin-top:12px;color:green;"></div>
    </form>
  </section>

<script>
const PROJECTS_KEY = 'crewProjects';
const MESSAGES_KEY = 'crewMessages';

document.getElementById('bookingForm').addEventListener('submit', function(e){
  e.preventDefault();
  const service = document.getElementById('serviceType').value.trim();
  const date = document.getElementById('eventDate').value;
  const location = document.getElementById('eventLocation').value.trim();
  const details = document.getElementById('eventDetails').value.trim();

  if(!service || !date || !location) {
    showMsg('Please fill all required fields', true);
    return;
  }

  const project = {
    id: 'p' + Date.now(),
    title: service,
    date,
    location,
    details,
    status: 'Booked',
    createdAt: new Date().toISOString()
  };

  const projects = JSON.parse(localStorage.getItem(PROJECTS_KEY) || '[]');
  projects.unshift(project);
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));

  // add a confirmation message
  const messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
  messages.unshift({
    id: 'm' + Date.now(),
    from: 'System',
    text: `Booking created: ${service} on ${date} at ${location}.`,
    createdAt: new Date().toISOString(),
    read: false
  });
  localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));

  showMsg('Booking created successfully!');
  // reset form after small delay and navigate to projects
  setTimeout(()=> {
    window.location.href = 'crewprojects.html';
  }, 900);
});

function showMsg(msg, isError){
  const el = document.getElementById('bookMsg');
  el.style.color = isError ? '#c62828' : 'green';
  el.textContent = msg;
  setTimeout(()=> el.textContent = '', 3500);
}
</script>
</body>
</html>
